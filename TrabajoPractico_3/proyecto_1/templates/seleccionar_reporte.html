<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Seleccionar Reporte Departamental</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h2>Generar Reporte Departamental</h2>
        <p>Como Secretario/a Técnico/a, puedes generar un reporte para cualquier departamento.</p>

        <form action="{{ url_for('generar_reporte') }}" method="GET">
            <div class="form-group">
                <label for="departamento" class="form-label">Selecciona un Departamento:</label>
                <select name="departamento" id="departamento" class="form-control" required>
                    {% for depto in departamentos %}
                        <option value="{{ depto }}">{{ depto }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <button type="submit" name="formato" value="html" class="btn-primary">Ver Reporte (HTML)</button>
                <button type="submit" name="formato" value="pdf" class="btn-primary">Descargar Reporte (PDF)</button>
            </div>
        </form>

        <div class="links-container" style="margin-top: 20px;">
            <a href="{{ url_for('dashboard') }}">Volver al Dashboard</a>
        </div>
    </div>
</body>
</html>
